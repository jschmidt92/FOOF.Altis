<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOF Intel</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: transparent;
            color: #F2F7FA;
            font-family: "Roboto Condensed", "Arial Narrow", Arial, sans-serif;
            letter-spacing: 0;
        }

        body {
            padding: 14px;
        }

        .panel {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(18, 34, 48, 0.92), rgba(3, 8, 14, 0.92)),
                rgba(12, 22, 32, 0.82);
            border: 1px solid rgba(37, 215, 255, 0.26);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.42), inset 0 0 28px rgba(37, 215, 255, 0.05);
            clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
        }

        .panel::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(90deg, rgba(37, 215, 255, 0.08), transparent 18%, transparent 82%, rgba(37, 215, 255, 0.06)),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.025) 1px, transparent 1px, transparent 5px);
            opacity: 0.8;
        }

        .content {
            position: relative;
            z-index: 1;
            height: 100%;
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            gap: 12px;
            padding: 18px;
        }

        .topline {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
        }

        .eyebrow {
            color: #25D7FF;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
        }

        h1 {
            margin: 2px 0 0;
            font-size: 30px;
            line-height: 1;
            font-weight: 900;
            text-transform: uppercase;
        }

        .status-chip {
            min-width: 118px;
            padding: 8px 12px;
            color: #A7FF5A;
            background: rgba(20, 34, 48, 0.82);
            border-left: 3px solid #A7FF5A;
            font-size: 14px;
            font-weight: 800;
            text-align: right;
            text-transform: uppercase;
            box-shadow: inset 0 0 18px rgba(167, 255, 90, 0.04);
        }

        .status-chip.warn {
            color: #FFB84A;
            border-left-color: #FFB84A;
        }

        .status-chip.bad {
            color: #FF4D5E;
            border-left-color: #FF4D5E;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .meta {
            min-width: 0;
            padding: 10px;
            background: rgba(20, 34, 48, 0.72);
            border: 1px solid rgba(103, 232, 255, 0.16);
        }

        .label {
            color: #66788A;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .value {
            margin-top: 4px;
            color: #F2F7FA;
            font-size: 20px;
            font-weight: 900;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result {
            min-height: 0;
            padding: 16px;
            background: rgba(20, 34, 48, 0.82);
            border: 1px solid rgba(37, 215, 255, 0.2);
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.22);
        }

        .result-title {
            color: #25D7FF;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .result-message {
            margin-top: 10px;
            color: #A7B7C8;
            font-size: 20px;
            line-height: 1.22;
            font-weight: 700;
        }

        .result-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 14px;
        }

        .detail-box {
            padding: 10px;
            background: rgba(3, 8, 14, 0.34);
            border-left: 2px solid rgba(37, 215, 255, 0.64);
        }

        .detail-box strong {
            display: block;
            color: #66788A;
            font-size: 12px;
            text-transform: uppercase;
        }

        .detail-box span {
            display: block;
            margin-top: 2px;
            color: #FFB84A;
            font-size: 22px;
            font-weight: 900;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 104px;
            gap: 10px;
        }

        button {
            height: 46px;
            border: 0;
            color: #F2F7FA;
            font-family: inherit;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
        }

        button.primary {
            background: linear-gradient(135deg, rgba(36, 124, 255, 0.86), rgba(37, 215, 255, 0.74));
            box-shadow: 0 0 22px rgba(37, 215, 255, 0.18);
        }

        button.secondary {
            background: rgba(20, 34, 48, 0.9);
            border: 1px solid rgba(103, 232, 255, 0.2);
        }

        button:disabled {
            color: #66788A;
            background: rgba(20, 34, 48, 0.48);
            box-shadow: none;
        }

        .pulse {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.58;
            }
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="content">
            <div class="topline">
                <div>
                    <div class="eyebrow">FOOF / Field Intel</div>
                    <h1 id="title">Intel Search</h1>
                </div>
                <div id="status" class="status-chip">Ready</div>
            </div>

            <div class="meta-grid">
                <div class="meta">
                    <div class="label">Body Grid</div>
                    <div id="bodyGrid" class="value">----</div>
                </div>
                <div class="meta">
                    <div class="label">Range</div>
                    <div id="distance" class="value">--m</div>
                </div>
                <div class="meta">
                    <div class="label">Source</div>
                    <div id="source" class="value">Enemy</div>
                </div>
            </div>

            <div class="result">
                <div id="resultTitle" class="result-title">Awaiting Search</div>
                <div id="message" class="result-message">Search the casualty for recoverable battlefield intel.</div>
                <div class="result-detail">
                    <div class="detail-box">
                        <strong>Intel Radius</strong>
                        <span id="radius">----</span>
                    </div>
                    <div class="detail-box">
                        <strong>Marked Grid</strong>
                        <span id="grid">----</span>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="searchButton" class="primary" type="button" onclick="FOOFIntel.search()">Search</button>
                <button class="secondary" type="button" onclick="FOOFIntel.close()">Close</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            "use strict";

            var hasResult = false;

            function send(event, data) {
                var payload = JSON.stringify({ event: event, data: data || {} });

                if (typeof A3API !== "undefined" && A3API.SendAlert) {
                    A3API.SendAlert(payload);
                }
            }

            function node(id) {
                return document.getElementById(id);
            }

            function text(id, value) {
                node(id).textContent = value;
            }

            function meters(value) {
                var number = Math.round(Number(value || 0));

                if (number <= 0) {
                    return "----";
                }

                return number.toString() + "m";
            }

            function setStatus(label, mode, pulsing) {
                node("status").textContent = label;
                node("status").className = "status-chip" + (mode ? " " + mode : "") + (pulsing ? " pulse" : "");
            }

            function applyReady(payload) {
                text("bodyGrid", payload.bodyGrid || "----");
                text("distance", meters(payload.distance));
                text("source", payload.bodySideKey || "Enemy");

                if (!hasResult) {
                    text("resultTitle", "Awaiting Search");
                    text("message", payload.searchable ? "Search the casualty for recoverable battlefield intel." : "This body has already been searched.");
                    text("radius", "----");
                    text("grid", "----");
                }

                node("searchButton").disabled = !payload.searchable;
                setStatus(payload.searchable ? "Ready" : "Spent", payload.searchable ? "" : "warn", false);
            }

            function applyResult(payload) {
                hasResult = true;

                text("title", payload.title || "Intel Search");
                text("resultTitle", payload.title || "Intel Result");
                text("message", payload.message || "No result.");
                text("radius", payload.radius ? meters(payload.radius) : "----");
                text("grid", payload.grid || "----");
                node("searchButton").disabled = true;

                if (!payload.success) {
                    setStatus("Rejected", "bad", false);
                    return;
                }

                if (payload.type === "none") {
                    setStatus("No Intel", "warn", false);
                    return;
                }

                setStatus("Mapped", "", false);
            }

            window.FOOFIntel = {
                receive: function (payload) {
                    payload = payload || {};

                    if (payload.type === "ready") {
                        applyReady(payload);
                        return;
                    }

                    applyResult(payload);
                },
                search: function () {
                    node("searchButton").disabled = true;
                    setStatus("Searching", "warn", true);
                    text("resultTitle", "Searching");
                    text("message", "Recovering documents and radio traces.");
                    send("intel::search", {});
                },
                close: function () {
                    send("intel::close", {});
                }
            };

            window.addEventListener("load", function () {
                send("intel::ready", {});
            });
        }());
    </script>
</body>
</html>
